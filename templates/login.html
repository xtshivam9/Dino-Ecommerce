{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        background-color: #f9fafb;
        padding: 40px 20px;
    }
    
    .login-card {
        background: #ffffff;
        width: 100%;
        max-width: 450px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: 1px solid #f3f4f6;
        padding: 40px;
        box-sizing: border-box;
    }
    
    .login-card h2 {
        font-size: 28px;
        margin-bottom: 30px;
        font-weight: 700;
        text-align: center;
        color: #111827;
        letter-spacing: 0.5px;
    }
    
    .login-card p {
        font-size: 14px;
        font-weight: 600;
        color: #4b5563;
        margin-bottom: 8px;
    }
    
    .login-card input[type="text"], 
    .login-card input[type="password"] {
        width: 100%;
        height: 48px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 0 15px;
        font-size: 15px;
        color: #111827;
        margin-bottom: 24px;
        transition: border-color 0.3s, box-shadow 0.3s;
        box-sizing: border-box;
        outline: none;
    }
    
    .login-card input[type="text"]:focus, 
    .login-card input[type="password"]:focus {
        border-color: #111827;
        box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
    }
    
    .login-card input[type="submit"] {
        width: 100%;
        background: #111827;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        padding: 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: background 0.3s, transform 0.1s;
        margin-bottom: 20px;
    }
    
    .login-card input[type="submit"]:hover {
        background: #374151;
    }
    
    .login-card input[type="submit"]:active {
        transform: scale(0.98);
    }
    
    .login-card .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
    }
    
    .login-card a {
        color: #6b7280;
        text-decoration: none;
        transition: color 0.2s;
    }
    
    .login-card a:hover {
        color: #111827;
        text-decoration: underline;
    }

    @media(max-width: 576px) {
        .login-card {
            padding: 30px 20px;
        }
    }
</style>

<div class="login-container">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <form action="" autocomplete="off" method="post">
            {% csrf_token %}
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <p>Username</p>
            <input type="text" name="username" placeholder="Enter your username">
            <p>Password</p>
            <input type="password" name="password" placeholder="Enter your password">
            <input type="submit" name="login-btn" value="Sign In">
            
            <div class="options">
                <a href="{% url 'account_reset_password' %}">Forgot your password?</a>
                <a href="/accounts/signup/">Create account</a>
            </div>
        </form>        
    </div>
</div>

{% endblock content %}
