{% extends 'base.html' %}
{% load static %}
{% block head_title %}Contact Us{% endblock %}
{% block content %}
<style>
  .premium-page {
    width: 100%;
    padding: 5rem 0 7rem;
    background:
      radial-gradient(circle at top left, rgba(113, 127, 224, 0.08), transparent 30%),
      radial-gradient(circle at bottom right, rgba(0, 0, 0, 0.04), transparent 28%),
      linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
    font-family: 'Inter', 'Roboto', sans-serif;
  }
  .premium-kicker {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(113, 127, 224, 0.12);
    color: #4f46e5;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .premium-title {
    font-size: clamp(2.4rem, 4vw, 3.5rem);
    line-height: 1.05;
    letter-spacing: -0.04em;
    color: #0f172a;
    font-weight: 800;
    margin-bottom: 15px;
  }
  .premium-lead {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #475569;
    max-width: 600px;
    margin: 0 auto 40px;
  }
  
  .contact-card {
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(17, 24, 39, 0.08);
    border-radius: 28px;
    box-shadow: 0 24px 50px rgba(15, 23, 42, 0.06);
    padding: 50px;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  
  .contact-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #4f46e5, #ec4899);
  }

  .form-group label {
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 8px;
    font-size: 0.95rem;
  }

  .form-control {
    border: 1px solid #cbd5e1 !important;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 1rem;
    color: #0f172a;
    background-color: #f8fafc;
    transition: all 0.3s ease;
    height: auto;
  }

  .form-control:focus {
    border-color: #4f46e5 !important;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1) !important;
    background-color: #ffffff;
  }
  
  textarea.form-control {
    min-height: 140px;
    resize: vertical;
  }

  .submit-btn {
    background: #111827;
    color: #ffffff;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 16px;
    border: none;
    border-radius: 12px;
    width: 100%;
    transition: all 0.2s ease;
    margin-top: 10px;
  }

  .submit-btn:hover {
    background: #4f46e5;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
  }

  @media (max-width: 768px) {
    .contact-card { padding: 30px; }
    .premium-page { padding: 3rem 1rem 5rem; }
  }
</style>

<section class="premium-page">
  <div class="container text-center">
    <div class="premium-kicker">Get In Touch</div>
    <h1 class="premium-title">Let's Connect</h1>
    <p class="premium-lead">Have a question or feedback? We'd love to hear from you. Send us a message and our team will get back to you shortly.</p>

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <div class="contact-card">
          <form action="{% url 'core:send_contact_message' %}" method="post">
            {% csrf_token %}
            <div class="form-group mb-4">
              <label>Full Name</label>
              <input type="text" name="name" class="form-control" placeholder="Jane Doe" required>
            </div>
            
            <div class="form-group mb-4">
              <label>Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="jane@example.com" required>
            </div>
            
            <div class="form-group mb-4">
              <label>Your Message</label>
              <textarea name="message" class="form-control" placeholder="How can we help you today?" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">
              Send Message <i class="fas fa-paper-plane ml-2"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
