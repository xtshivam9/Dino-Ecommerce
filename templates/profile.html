{% extends 'base.html' %}

{% block content %}
<section style="min-height: 70vh; background: #f8fafc; padding: 40px 16px;">
  <div style="max-width: 760px; margin: 0 auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); overflow: hidden;">
    <div style="padding: 24px 28px; border-bottom: 1px solid #e2e8f0; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);">
      <h2 style="margin: 0; font-size: 28px; color: #0f172a;">My Profile</h2>
      <p style="margin: 8px 0 0; color: #64748b;">Manage your account and sign out safely.</p>
    </div>

    <div style="padding: 24px 28px;">
      <div style="margin-bottom: 18px;">
        <p style="margin: 0 0 6px; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;">Username</p>
        <p style="margin: 0; color: #0f172a; font-size: 18px; font-weight: 700;">{{ request.user.username }}</p>
      </div>

      <div style="margin-bottom: 24px;">
        <p style="margin: 0 0 6px; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;">Email</p>
        <p style="margin: 0; color: #0f172a; font-size: 16px;">{{ request.user.email|default:'Not provided' }}</p>
      </div>

      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <a href="{% url 'core:my-orders' %}" style="display: inline-block; padding: 10px 18px; border-radius: 999px; border: 1px solid #cbd5e1; color: #0f172a; text-decoration: none; font-weight: 600;">My Orders</a>
        <a href="{% url 'core:order-summary' %}" style="display: inline-block; padding: 10px 18px; border-radius: 999px; border: 1px solid #cbd5e1; color: #0f172a; text-decoration: none; font-weight: 600;">My Cart</a>
        <a href="{% url 'core:logout' %}" style="display: inline-block; padding: 10px 18px; border-radius: 999px; border: 1px solid #dc2626; background: #dc2626; color: #fff; text-decoration: none; font-weight: 700;">Logout</a>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
